version: '3.8'

services:
  pyplanet:
    build:
      context: .
      dockerfile: Dockerfile.custom
    container_name: pyplanet
    restart: unless-stopped
    ports:
      - "8080:8080"  # Music HTTP server
    volumes:
      - ./server:/app/server  # Mount your server config
      - music-data:/app/server/music  # Persist downloaded music
    depends_on:
      - db
    environment:
      - PYPLANET_DEBUG=0

  db:
    image: mysql:8.0
    container_name: pyplanet-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pyplanet
      MYSQL_USER: pyplanet
      MYSQL_PASSWORD: pyplanet
    volumes:
      - db-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  db-data:
  music-data:
